<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>Painel Startup - AdMob</title>

    <style>
        :root {
            --bg: #0A0A0C;
            --card: #1A1A1E;
            --primary: #FF7023;
            --text: #FFFFFF;
            --muted: #A0A0A0;
            --border: #333;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: Arial;
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 1100px;
            margin: auto;
            border: 1px solid var(--primary);
        }

        .header {
            background: var(--primary);
            padding: 10px;
            font-weight: bold;
        }

        .content {
            display: flex;
            gap: 20px;
            padding: 20px;
        }

        .sidebar {
            flex: 1;
            border: 1px solid var(--border);
            padding: 15px;
        }

        .main {
            flex: 2;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        input {
            width: 100%;
            margin: 8px 0;
            padding: 10px;
            background: #111;
            border: none;
            color: white;
        }

        button {
            background: var(--primary);
            border: none;
            padding: 12px;
            width: 100%;
            color: white;
            cursor: pointer;
        }

        .card {
            border: 1px solid var(--border);
            padding: 15px;
            text-align: center;
        }

        .highlight {
            border: 1px solid var(--primary);
        }

        .value {
            font-size: 22px;
            font-weight: bold;
        }

        .big {
            font-size: 36px;
            color: var(--primary);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="header">PAINEL ESTRATÉGICO - MONETIZAÇÃO ADMOB</div>

        <div class="content">

            <div class="sidebar">

                <label>Usuários diários (DAU)</label>
                <input type="number" id="users" value="1500">

                <label>Sessões por dia</label>
                <input type="number" id="sessions" value="4">

                <label>eCPM Intersticial (R$)</label>
                <input type="number" id="inter" value="10">

                <label>eCPM Banner (R$)</label>
                <input type="number" id="banner" value="1">

                <label>Crescimento mensal (%)</label>
                <input type="number" id="growth" value="10">

                <label>Retenção DAU/MAU (%)</label>
                <input type="number" id="retention" value="20">

                <label>Custo por usuário (R$)</label>
                <input type="number" id="cost" value="0.40">

                <label>Múltiplo Valuation</label>
                <input type="number" id="multiple" value="24">

                <button onclick="calc()">CALCULAR</button>

            </div>

            <div class="main">

                <div class="grid">

                    <div class="card">
                        <div>Receita Mensal</div>
                        <div class="value" id="monthly">R$0</div>
                    </div>

                    <div class="card">
                        <div>MAU Estimado</div>
                        <div class="value" id="mau">0</div>
                    </div>

                    <div class="card">
                        <div>Lucro Mensal</div>
                        <div class="value" id="profit">R$0</div>
                    </div>

                    <div class="card highlight">
                        <div>Valuation</div>
                        <div class="big" id="valuation">R$0</div>
                    </div>

                </div>

                <div class="card">
                    <div>Projeção 12 meses</div>
                    <div id="projection" style="text-align:left; font-size:12px;"></div>
                </div>

            </div>
        </div>
    </div>

    <script>
        function money(v) {
            return v.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
        }

        function calc() {

            let users = +document.getElementById('users').value;
            let sessions = +document.getElementById('sessions').value;
            let interEcpm = +document.getElementById('inter').value;
            let bannerEcpm = +document.getElementById('banner').value;
            let growth = +document.getElementById('growth').value / 100;
            let retention = +document.getElementById('retention').value / 100;
            let cost = +document.getElementById('cost').value;
            let multiple = +document.getElementById('multiple').value;

            // Impressões
            let bannerImp = users * sessions * 30;
            let interImp = users * sessions * 2 * 30;

            let bannerRev = (bannerImp / 1000) * bannerEcpm;
            let interRev = (interImp / 1000) * interEcpm;

            let monthly = bannerRev + interRev;

            // MAU
            let mau = users / retention;

            // Custo
            let totalCost = users * cost;
            let profit = monthly - totalCost;

            // Valuation
            let valuation = monthly * multiple;

            document.getElementById('monthly').innerText = money(monthly);
            document.getElementById('mau').innerText = Math.round(mau).toLocaleString();
            document.getElementById('profit').innerText = money(profit);
            document.getElementById('valuation').innerText = money(valuation);

            // Projeção
            let proj = "";
            let currentUsers = users;

            for (let i = 1; i <= 12; i++) {

                currentUsers *= (1 + growth);

                let bannerImp = currentUsers * sessions * 30;
                let interImp = currentUsers * sessions * 2 * 30;

                let rev = ((bannerImp / 1000) * bannerEcpm) + ((interImp / 1000) * interEcpm);

                proj += "Mês " + i + ": " + money(rev) + "<br>";
            }

            document.getElementById('projection').innerHTML = proj;
        }

        calc();
    </script>

</body>

</html>
